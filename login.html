<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - The Lounge Royale</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="customer-page login-page">
    <main class="page-frame page-wide">
        <img class="page-design" src="assets/references/signin_customer.png" alt="Sign in to The Lounge Royale">

        <a class="overlay-link" href="index.html" aria-label="Home" style="left:9.2%;top:7.1%;width:12%;height:22%"></a>
        <form action="login.php" method="POST">
            <input class="canva-input" style="left:5.25%;top:48.1%;width:91.65%;height:4.5%" type="email" name="email" autocomplete="email" required aria-label="Email address or username">
            <input class="canva-input" style="left:5.25%;top:60.0%;width:91.65%;height:4.5%" type="password" name="password" autocomplete="current-password" required aria-label="Password">
            <button class="overlay-button" style="left:4.85%;top:69.25%;width:92.35%;height:7.35%" type="submit" aria-label="Sign In"></button>
        </form>
        <a class="signin-register-link" href="register.html">No account yet? <span>Sign up</span></a>
    </main>
</body>
</html>
