<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - The Lounge Royale</title>
    <link rel="stylesheet" href="style.css">
    <script>
        if (location.protocol === "file:") {
            location.replace("http://localhost/LoungeRoyale/login.html");
        }
        window.addEventListener("DOMContentLoaded", () => {
            const params = new URLSearchParams(location.search);
            const error = params.get("error");
            if (!error) return;
            const message = document.querySelector("[data-login-message]");
            if (message) message.textContent = error;
        });
    </script>
</head>
<body class="auth-page">
    <main class="site-shell">
        <section class="auth-wrap signin-wrap">
            <a href="index.html" aria-label="The Lounge Royale home">
                <img class="auth-logo" src="assets/main logo.png" alt="The Lounge Royale">
            </a>
            <h1 class="auth-title">Sign In To Your Account</h1>
            <form class="auth-card" action="login.php" method="POST">
                <p class="form-alert" data-login-message></p>
                <label>Email address/Username
                    <input type="email" name="email" autocomplete="email" required>
                </label>
                <label>Password
                    <input type="password" name="password" autocomplete="current-password" required>
                </label>
                <button class="gold-button" type="submit">Sign In</button>
                <p class="auth-switch">No account yet? <a href="register.html">Sign up</a></p>
            </form>
        </section>
    </main>
</body>
</html>
