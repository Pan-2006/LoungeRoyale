<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Appointment – The Lounge Royale</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        .booking-overlay {
            position: absolute;
            z-index: 20;
            left: 14.0%;
            top: 13.5%;
            width: 36.0%;
            height: 81.0%;
            background: transparent;
            padding: 2.5% 3.5%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .booking-overlay select,
        .booking-overlay button { pointer-events: auto; }
        .booking-overlay select {
            width: 100%;
            padding: 6px 10px;
            background: rgba(255,255,255,0.9);
            border: 1px solid rgba(100,90,60,0.35);
            border-radius: 4px;
            font-size: clamp(8px, 0.82vw, 12px);
            color: #111;
        }
        .booking-overlay .bp-label {
            font-size: clamp(7px, 0.7vw, 10px);
            font-weight: 700;
            text-transform: uppercase;
            color: #1a1a1a;
            margin-bottom: 3px;
        }
        .booking-continue {
            margin-top: auto;
            width: 100%;
            padding: 8px;
            background: linear-gradient(135deg, #f5c842, #e2991f);
            border: none;
            border-radius: 22px;
            font-size: clamp(8px, 0.78vw, 12px);
            font-weight: 800;
            text-transform: uppercase;
            color: #1a0f00;
            cursor: pointer;
        }
        .booking-continue:hover { background: linear-gradient(135deg, #ffd454, #e8a82e); }
    </style>
</head>
<body>

<div class="design-canvas">
    <img class="page-design" src="../assets/references/appointment_HandServices_customer.png" alt="Book Appointment">

    <!-- Original form — action and name untouched -->
    <form class="booking-overlay" action="services.php" method="GET">
        <div>
            <div class="bp-label">Select Service Category</div>
            <select name="category" required>
                <option value="">Choose Category</option>
                <option value="Hand Services">Hand Services</option>
                <option value="Foot Services">Foot Services</option>
                <option value="Royale Deluxe">Royale Deluxe</option>
                <option value="Nail Extension">Nail Extension</option>
                <option value="Kiddie Services">Kiddie Services</option>
                <option value="Wax Services">Wax Services</option>
            </select>
        </div>
        <button type="submit" class="booking-continue">Continue →</button>
    </form>
</div>

</body>
</html>
