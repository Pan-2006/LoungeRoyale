<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Lounge Royale</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="design-canvas">
    <img class="page-design" src="assets/references/home page_customer.png" alt="The Lounge Royale">

    <!-- Nav: HOME -->
    <button class="hotspot" style="left:37.5%;top:1.2%;width:5.5%;height:5%"
        onclick="window.location.href='index.html'" aria-label="Home"></button>

    <!-- Nav: ABOUT -->
    <button class="hotspot" style="left:43.5%;top:1.2%;width:5.5%;height:5%"
        onclick="window.location.href='about.html'" aria-label="About"></button>

    <!-- Nav: SERVICES -->
    <button class="hotspot" style="left:49.5%;top:1.2%;width:6.5%;height:5%"
        onclick="window.location.href='login.html'" aria-label="Services"></button>

    <!-- Nav: APPOINTMENT -->
    <button class="hotspot" style="left:56.5%;top:1.2%;width:8.5%;height:5%"
        onclick="window.location.href='login.html'" aria-label="Appointment"></button>

    <!-- LOGIN/REGISTER gold pill top right -->
    <button class="hotspot" style="left:63.5%;top:0.8%;width:19%;height:5.5%"
        onclick="window.location.href='register.html'" aria-label="Login or Register"></button>

    <!-- BOOK YOUR APPOINTMENT HERE hero button -->
    <button class="hotspot" style="left:4.0%;top:26.5%;width:31%;height:6%"
        onclick="window.location.href='register.html'" aria-label="Book Appointment"></button>

    <!-- NAIL CARE card -->
    <button class="hotspot" style="left:1.8%;top:54%;width:18%;height:23%"
        onclick="window.location.href='login.html'" aria-label="Nail Care"></button>

    <!-- FOOT SPA card -->
    <button class="hotspot" style="left:20.5%;top:54%;width:18%;height:23%"
        onclick="window.location.href='login.html'" aria-label="Foot Spa"></button>

    <!-- LASH SERVICES card -->
    <button class="hotspot" style="left:39.5%;top:54%;width:18%;height:23%"
        onclick="window.location.href='login.html'" aria-label="Lash Services"></button>

    <!-- WAXING card -->
    <button class="hotspot" style="left:58.5%;top:54%;width:18%;height:23%"
        onclick="window.location.href='login.html'" aria-label="Waxing"></button>

</div>

</body>
</html>
