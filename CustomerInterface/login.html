<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In – The Lounge Royale</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="design-canvas">
    <img class="page-design" src="assets/references/signin_customer.png" alt="Sign In">

    <form class="overlay-form signin-form" action="login.php" method="POST">
        <label>Email
            <input type="email" name="email" autocomplete="email" required>
        </label>
        <label>Password
            <input type="password" name="password" autocomplete="current-password" required>
        </label>
        <button type="submit" class="overlay-submit">Sign In</button>
    </form>

    <button type="button" class="signin-register-link"
        onclick="window.location.href='register.html'">
        No account yet? <span>Sign up</span>
    </button>
</div>

</body>
</html>
