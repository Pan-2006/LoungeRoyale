<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Lounge Royale Admin</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="screen-wrap">
    <section class="screen-page active" id="page-home">
      <img src="file:///C:/Users/Chloe/AppData/Local/Temp/home%20page_admin%20(4).png" alt="Home page admin" />
      <button class="hotspot nav-home" data-page="home" aria-label="Home"></button>
      <button class="hotspot nav-about" data-page="about" aria-label="About"></button>
      <button class="hotspot nav-services" data-page="home" aria-label="Services"></button>
      <button class="hotspot nav-dashboard" data-page="dashboard" aria-label="Admin Dashboard"></button>
      <button class="hotspot nav-bookings" data-page="bookings" aria-label="Manage bookings"></button>
      <button class="hotspot nav-clients" data-page="clients" aria-label="Manage clients"></button>
      <button class="hotspot nav-auth" data-page="signup" aria-label="Login or register"></button>
      <button class="hotspot book-button" data-page="signup" aria-label="Book appointment"></button>
    </section>

    <section class="screen-page" id="page-about">
      <img src="file:///C:/Users/Chloe/AppData/Local/Temp/about%20us_admin%20(3).png" alt="About us admin" />
      <button class="hotspot nav-home" data-page="home" aria-label="Home"></button>
      <button class="hotspot nav-about" data-page="about" aria-label="About"></button>
      <button class="hotspot nav-services" data-page="home" aria-label="Services"></button>
      <button class="hotspot nav-dashboard" data-page="dashboard" aria-label="Admin Dashboard"></button>
      <button class="hotspot nav-bookings" data-page="bookings" aria-label="Manage bookings"></button>
      <button class="hotspot nav-clients" data-page="clients" aria-label="Manage clients"></button>
      <button class="hotspot nav-auth" data-page="signup" aria-label="Login or register"></button>

      <div class="movable-map" id="movableMap">
        <div class="map-bar" id="mapBar">Move map</div>
        <iframe
          title="The Lounge Royale location"
          src="https://www.google.com/maps?q=20A%20Sandoval%20Ave%20Pasig&output=embed"
          loading="lazy"
          referrerpolicy="no-referrer-when-downgrade">
        </iframe>
      </div>
    </section>

    <section class="screen-page form-page" id="page-signup">
      <img src="file:///C:/Users/Chloe/AppData/Local/Temp/signup_signin_admin%20(1).png" alt="Register employee admin" />
      <button class="hotspot signin-side" data-page="signin" aria-label="Go to sign in"></button>

      <form class="real-register" id="registerForm">
        <input id="regName" type="text" required aria-label="Name" />
        <input id="regAge" type="number" min="16" aria-label="Age" />
        <input id="regAddress" type="text" required aria-label="Address" />
        <input id="regEmail" type="email" required aria-label="Email address" />
        <input id="regPassword" type="password" required aria-label="Password" />
        <button type="submit" aria-label="Register"></button>
      </form>
    </section>

    <section class="screen-page form-page" id="page-signin">
      <img src="file:///C:/Users/Chloe/AppData/Local/Temp/signin_admin%20(1).png" alt="Sign in admin" />

      <form class="real-signin" id="signinForm">
        <input id="loginEmail" type="email" required aria-label="Email address or username" />
        <input id="loginPassword" type="password" required aria-label="Password" />
        <button type="submit" aria-label="Sign in"></button>
      </form>
    </section>

    <section class="screen-page" id="page-dashboard">
      <img src="file:///C:/Users/Chloe/AppData/Local/Temp/ADMIN%20DASHBOARD_ADMIN%20(1).png" alt="Admin dashboard" />
      <button class="hotspot nav-home" data-page="home" aria-label="Home"></button>
      <button class="hotspot nav-about" data-page="about" aria-label="About"></button>
      <button class="hotspot nav-services" data-page="home" aria-label="Services"></button>
      <button class="hotspot nav-dashboard" data-page="dashboard" aria-label="Admin Dashboard"></button>
      <button class="hotspot nav-bookings" data-page="bookings" aria-label="Manage bookings"></button>
      <button class="hotspot nav-clients" data-page="clients" aria-label="Manage clients"></button>
      <button class="hotspot nav-logout" data-page="home" aria-label="Logout"></button>
      <button class="hotspot profile-link" data-page="profile" aria-label="Profile"></button>
      <button class="hotspot dash-bookings" data-page="bookings" aria-label="Manage bookings"></button>
      <button class="hotspot dash-clients" data-page="clients" aria-label="Manage clients"></button>
      <button class="hotspot dash-staffs" data-page="staffs" aria-label="Staffs"></button>
    </section>

    <section class="screen-page" id="page-staffs">
      <img src="file:///C:/Users/Chloe/AppData/Local/Temp/STAFFS_ADMIN.png" alt="Staffs admin" />
      <button class="hotspot nav-home" data-page="home" aria-label="Home"></button>
      <button class="hotspot nav-about" data-page="about" aria-label="About"></button>
      <button class="hotspot nav-services" data-page="home" aria-label="Services"></button>
      <button class="hotspot nav-dashboard" data-page="dashboard" aria-label="Admin Dashboard"></button>
      <button class="hotspot nav-bookings" data-page="bookings" aria-label="Manage bookings"></button>
      <button class="hotspot nav-clients" data-page="clients" aria-label="Manage clients"></button>
      <button class="hotspot nav-logout" data-page="home" aria-label="Logout"></button>
      <button class="hotspot profile-link" data-page="profile" aria-label="Profile"></button>
    </section>

    <section class="screen-page" id="page-bookings">
      <img src="file:///C:/Users/Chloe/AppData/Local/Temp/MANAGE%20BOOKINGS_ADMIN%20(1).png" alt="Manage bookings admin" />
      <button class="hotspot nav-home" data-page="home" aria-label="Home"></button>
      <button class="hotspot nav-about" data-page="about" aria-label="About"></button>
      <button class="hotspot nav-services" data-page="home" aria-label="Services"></button>
      <button class="hotspot nav-dashboard" data-page="dashboard" aria-label="Admin Dashboard"></button>
      <button class="hotspot nav-bookings" data-page="bookings" aria-label="Manage bookings"></button>
      <button class="hotspot nav-clients" data-page="clients" aria-label="Manage clients"></button>
      <button class="hotspot nav-logout" data-page="home" aria-label="Logout"></button>
      <button class="hotspot profile-link" data-page="profile" aria-label="Profile"></button>
    </section>

    <section class="screen-page" id="page-clients">
      <img src="file:///C:/Users/Chloe/AppData/Local/Temp/MANAGE%20CLIENTS_ADMIN%20(1).png" alt="Manage clients admin" />
      <button class="hotspot nav-home" data-page="home" aria-label="Home"></button>
      <button class="hotspot nav-about" data-page="about" aria-label="About"></button>
      <button class="hotspot nav-services" data-page="home" aria-label="Services"></button>
      <button class="hotspot nav-dashboard" data-page="dashboard" aria-label="Admin Dashboard"></button>
      <button class="hotspot nav-bookings" data-page="bookings" aria-label="Manage bookings"></button>
      <button class="hotspot nav-clients" data-page="clients" aria-label="Manage clients"></button>
      <button class="hotspot nav-logout" data-page="home" aria-label="Logout"></button>
      <button class="hotspot profile-link" data-page="profile" aria-label="Profile"></button>
    </section>

    <section class="screen-page" id="page-profile">
      <img src="file:///C:/Users/Chloe/AppData/Local/Temp/profile%20(1).png" alt="Profile admin" />
      <button class="hotspot nav-home" data-page="home" aria-label="Home"></button>
      <button class="hotspot nav-about" data-page="about" aria-label="About"></button>
      <button class="hotspot nav-services" data-page="home" aria-label="Services"></button>
      <button class="hotspot nav-dashboard" data-page="dashboard" aria-label="Admin Dashboard"></button>
      <button class="hotspot nav-bookings" data-page="bookings" aria-label="Manage bookings"></button>
      <button class="hotspot nav-clients" data-page="clients" aria-label="Manage clients"></button>
      <button class="hotspot nav-logout" data-page="home" aria-label="Logout"></button>
      <button class="hotspot profile-link" data-page="profile" aria-label="Profile"></button>
    </section>
  </main>

  <section class="requirements-panel">
    <h2>Admin Data</h2>

    <div class="crud-grid">
      <form id="bookingCrud">
        <h3>Booking CRUD</h3>
        <input type="hidden" id="bookingId" />
        <input id="bookingName" placeholder="Client name" required />
        <input id="bookingService" placeholder="Service" required />
        <input id="bookingDate" type="date" required />
        <button type="submit">Create / Update Booking</button>
      </form>

      <form id="clientCrud">
        <h3>Client CRUD</h3>
        <input type="hidden" id="clientId" />
        <input id="clientName" placeholder="Name" required />
        <input id="clientEmail" type="email" placeholder="Email" required />
        <button type="submit">Create / Update Client</button>
      </form>
    </div>

    <div class="crud-grid">
      <table>
        <thead>
          <tr>
            <th>Booking</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="bookingRows"></tbody>
      </table>

      <table>
        <thead>
          <tr>
            <th>Client</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="clientRows"></tbody>
      </table>
    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
