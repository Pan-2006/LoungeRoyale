<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - The Lounge Royale</title>
    <link rel="stylesheet" href="style.css">
    <script>
        if (location.protocol === "file:") {
            location.replace("http://localhost/LoungeRoyale/register.html");
        }
    </script>
</head>
<body class="auth-page">
    <main class="site-shell">
        <section class="auth-wrap register-wrap">
            <aside class="welcome-panel">
                <a href="index.html" aria-label="The Lounge Royale home">
                    <img class="auth-logo" src="assets/main logo.png" alt="The Lounge Royale">
                </a>
                <h1>Welcome Back!</h1>
                <p>Sign in if you already have an existing account.</p>
                <a class="gold-button" href="login.html">Sign In</a>
            </aside>
            <form class="auth-card" action="register.php" method="POST" onsubmit="this.confirm_password.value=this.password.value">
                <h1 class="page-title">Create Account</h1>
                <label>Name*
                    <input type="text" name="name" autocomplete="name" required>
                </label>
                <label>Email address*
                    <input type="email" name="email" autocomplete="email" required>
                </label>
                <label>Password*
                    <input type="password" name="password" autocomplete="new-password" minlength="6" required>
                </label>
                <input type="hidden" name="confirm_password">
                <button class="gold-button" type="submit">Sign Up</button>
            </form>
        </section>
    </main>
</body>
</html>
